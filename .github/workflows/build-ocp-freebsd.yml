name: Build OCP FreeBSD Wheel

on: workflow_dispatch

env:
  OCP: 7.9.3.1.1
  WHEEL: 7.9.3.1.1
  SOURCE_URL: https://github.com/elliejs/OCP/releases/download
  RELEASE_TO_REPO: "true"
  FBSD_PKGS: >-
    python311 py311-pip py311-setuptools py311-numpy
    opencascade vtk9 cmake ninja pybind11 py311-pybind11 gcc
    git py311-scipy py311-scikit-learn py311-sympy py311-ipython
    py311-ezdxf py311-requests py311-anytree lib3mf

jobs:
  # ================================================================================
  # Build OCP wheel for FreeBSD
  # No SDK step needed — OCCT and VTK come from pkg.
  # No delocate step needed — wheel depends on system-installed shared libraries.
  # ================================================================================

  ocp-freebsd:
    name: Build OCP wheel for Python 3.${{ matrix.py_min }} on FreeBSD (${{ matrix.use-vtk }})
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        py_min: ['11']
        use-vtk: ['vtk']

    steps:
      - uses: actions/checkout@v5

      # - - - - - - - - - - - - - - - - - - - - -
      # Download OCP sources and stubs
      # - - - - - - - - - - - - - - - - - - - - -

      - name: Download OCP sources and stubs
        run: |
          set -ex

          curl -L -O ${{ env.SOURCE_URL }}/${{ env.OCP }}/OCP_src_stubs_FreeBSD.zip
          unzip OCP_src_stubs_FreeBSD.zip

          mkdir -p ocp-src
          mv OCP_src_stubs_FreeBSD/OCP ocp-src/
          mv OCP_src_stubs_FreeBSD/OCP-stubs pypi-stubs/OCP-stubs

          rm -rf OCP_src_stubs_FreeBSD OCP_src_stubs_FreeBSD.zip

      # - - - - - - - - - - - - - - - - - - - - -
      # Compile and build wheels inside FreeBSD VM
      # - - - - - - - - - - - - - - - - - - - - -

      - name: Build wheels on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: '15.0'
          usesh: true
          prepare: |
            pkg install -y ${{ env.FBSD_PKGS }}

            # HACK: lib3mf Python bindings have no FreeBSD wheel on PyPI and
            # the pkg binding doesn't support FreeBSD's platform.system().
            # Remove this block when lib3mf ships FreeBSD wheels or the
            # FreeBSD port includes a proper Python package.
            LIB3MF_PY=/usr/local/include/Bindings/Python
            SP=/usr/local/lib/python3.11/site-packages/lib3mf
            mkdir -p $SP
            cp $LIB3MF_PY/Lib3MF.py $SP/
            ln -s /usr/local/lib/lib3mf.so $SP/lib3mf.so
            printf "from .Lib3MF import *\n" > $SP/__init__.py
            sed -i.bak "s/elif platform.system() == 'Linux'/elif platform.system() in ('Linux', 'FreeBSD')/" $SP/Lib3MF.py

            pip install --break-system-packages 'setuptools>=75.0' build wheel

          run: |
            set -ex

            WHEEL="${{ env.WHEEL }}"

            # ================================================================================
            #               Compile OCP from source
            # ================================================================================

            cmake -B build_native -S ocp-src/OCP -G Ninja \
              -DCMAKE_PREFIX_PATH="/usr/local;/usr/local/llvm-devel" \
              -DCMAKE_BUILD_TYPE=Release

            ninja -C build_native -j 2 -k 0

            cd build_native && python3.11 -c "import OCP; print('OCP import OK')" && cd ..

            # ================================================================================
            #               OCP wheel
            # ================================================================================

            cd pypi
            sed -i.bak "s/0\.0\.0\.0/${WHEEL}/g" pyproject.toml

            if [ "${{ matrix.use-vtk }}" = "vtk" ]; then
              PKG_NAME="cadquery_ocp"
              # Append vtk dependency — match version from pkg
              VTK_VER=$(python3.11 -c "import vtk; print(vtk.vtkVersion.GetVTKVersion())")
              sed -i.bak "s/\(dependencies = \[.*\)\]/\1, \"vtk==${VTK_VER}\"]/" pyproject.toml
            else
              PKG_NAME="cadquery_ocp_novtk"
              sed -i.bak 's/"cadquery-ocp"/"cadquery-ocp-novtk"/g' pyproject.toml
              sed -i.bak 's/sources"/sources (no VTK support)"/g' pyproject.toml
              sed -i.bak 's/cadquery-ocp /cadquery-ocp-novtk /g' README.md
            fi

            cat pyproject.toml

            # Download LICENSE
            mkdir -p ${PKG_NAME}
            cd ${PKG_NAME}
            curl -O https://raw.githubusercontent.com/elliejs/OCP/refs/heads/master/LICENSE
            cd ..

            # Copy compiled module
            cp ../build_native/OCP.cpython-3${{ matrix.py_min }}.so .

            # Generate module tree (creates OCP/ with __init__.py per submodule)
            python3.11 ocp-tree.py
            mv OCP.cpython-3${{ matrix.py_min }}.so OCP/
            ls -l OCP/*.so
            strip OCP/*.so
            ls -l OCP/*.so

            # Build wheel
            python3.11 -m build -w -n

            # Skip platform tagging — leave as pure-python wheel so pip
            # installs it on any FreeBSD version without --platform flags.


            # No delocate step — FreeBSD wheel depends on system-installed
            # OCCT and VTK shared libraries (via pkg install opencascade vtk9)

            unzip -l dist/${PKG_NAME}*.whl | tail -5

            # ================================================================================
            #               Stubs wheel
            # ================================================================================

            cd ../pypi-stubs
            sed -i.bak "s/0\.0\.0\.0/${WHEEL}/g" pyproject.toml

            python3.11 -m build -w -n
            cd ..

            # ================================================================================
            #               Tests
            # ================================================================================

            # Install the wheels we just built
            pip install --break-system-packages pypi/dist/${PKG_NAME}*.whl
            pip install --break-system-packages pypi-stubs/dist/*.whl

            python3.11 -c "import OCP; print('OCP import OK')"

            # Run build123d tests
            pip install --break-system-packages pytest packaging
            git clone https://github.com/elliejs/build123d.git
            cd build123d
            sed -i.bak '/"cadquery-ocp-novtk/d' pyproject.toml
            # HACK: strip lib3mf deps — no FreeBSD wheels on PyPI;
            # we installed lib3mf from pkg above instead.  Remove when
            # lib3mf ships FreeBSD wheels.
            sed -i.bak '/"lib3mf/d' pyproject.toml
            sed -i.bak '/"py-lib3mf/d' pyproject.toml
            pip install --break-system-packages .

            # vmactions/freebsd-vm ignores set -e, so capture the exit code
            TEST_RC=0
            if [ "${{ matrix.use-vtk }}" = "novtk" ]; then
              python3.11 -m pytest tests -v -W ignore \
                --ignore tests/test_direct_api/test_vtk_poly_data.py \
                --ignore tests/test_direct_api/test_jupyter.py \
                --ignore tests/test_examples.py \
                || TEST_RC=$?
            else
              python3.11 -m pytest tests -v -W ignore \
                --ignore tests/test_examples.py \
                || TEST_RC=$?
            fi
            cd ..

            # --- List results ---
            echo "=== Built wheels ==="
            ls -lh pypi/dist/ pypi-stubs/dist/

            exit $TEST_RC

      # - - - - - - - - - - - - - - - - - - - - -
      # Upload wheels
      # - - - - - - - - - - - - - - - - - - - - -

      - name: Upload cadquery-ocp wheel
        uses: actions/upload-artifact@v5
        with:
          name: cadquery-ocp-${{ env.WHEEL }}-freebsd-cp3${{ matrix.py_min }}
          path: pypi/dist/*.whl

      - name: Upload cadquery-ocp-stubs wheel
        uses: actions/upload-artifact@v5
        with:
          name: cadquery-ocp-stubs-${{ env.WHEEL }}-freebsd-cp3${{ matrix.py_min }}
          path: pypi-stubs/dist/*.whl

  # ================================================================================
  # Release wheels
  # ================================================================================

  release:
    name: Release wheels
    runs-on: ubuntu-latest
    needs: [ocp-freebsd]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        if: env.RELEASE_TO_REPO == 'true'

      - name: Download all wheel artifacts
        if: env.RELEASE_TO_REPO == 'true'
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: cadquery-*
          merge-multiple: true

      - name: Create release
        if: env.RELEASE_TO_REPO == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.WHEEL }}-freebsd
          name: FreeBSD Release ${{ env.WHEEL }}
          files: wheels/*.whl
          fail_on_unmatched_files: true
